# polychro:ai-safety — Catches patterns that fool schema validation but break at runtime
# Extends polychro:governance for full baseline coverage.
extends:
  - governance.yml

aliases:
  Consumes: "$.capability.consumes[*]"
  ConsumesDirect: "$.consumes[*]"
  Exposes: "$.capability.exposes[*]"
  Operations: "$.capability.exposes[*].resources[*].operations[*]"
  Steps: "$.capability.exposes[*].resources[*].operations[*].steps[*]"

rules:

  # Override governance rules to elevate severity where safety demands it

  consumer-base-uri-no-trailing-slash:
    severity: error

  consumer-base-uri-not-example:
    severity: error

  # ─── Runtime Safety Rules ───────────────────────────────────────────────────

  no-trailing-slash:
    message: "Consumer `baseUri` ends with `/` — causes double-slash in path resolution at runtime."
    description: "When baseUri ends with / and resource paths start with /, the combined URL contains // which many servers reject or route incorrectly."
    severity: error
    recommended: true
    given:
      - "#Consumes.baseUri"
      - "#ConsumesDirect.baseUri"
    then:
      function: pattern
      functionOptions:
        notMatch: "/$"

  empty-description:
    message: "Description field is present but empty — worse than absent (signals completeness without substance)."
    description: "An empty string description passes 'defined' checks but provides zero value. Either write a meaningful description or remove the field."
    severity: warn
    recommended: true
    given:
      - "$.info.description"
      - "#Consumes.description"
      - "#ConsumesDirect.description"
      - "#Exposes.description"
    then:
      function: length
      functionOptions:
        min: 1

  step-name-present:
    message: "Every step must have a `name` for traceability."
    description: "Step names appear in logs, error messages, and output parameter mappings. Unnamed steps break wiring."
    severity: error
    recommended: true
    given: "#Steps"
    then:
      field: "name"
      function: truthy

  step-call-present:
    message: "Every step must have a `call` target."
    description: "A step without a call target does nothing — it is dead code in the orchestration pipeline."
    severity: error
    recommended: true
    given: "#Steps"
    then:
      field: "call"
      function: truthy

  duplicate-operation-name:
    message: "Two operations share the same name — ambiguous `call` targets at runtime."
    description: "When multiple consumed operations have the same name across different resources or consumers, step call resolution becomes ambiguous and the engine cannot determine which to invoke."
    severity: error
    recommended: true
    given: "$.capability.consumes"
    then:
      function: uniqueOperationNames

  url-input-without-review:
    message: "Input parameter name suggests a URL — potential SSRF vector if passed unvalidated to a consumer call."
    description: "Parameters named url, callback, redirect, or webhook may be passed to consumer HTTP calls. If unvalidated, an attacker can point them at internal services. This is advisory (INFO) — review the usage in steps."
    severity: info
    recommended: true
    given:
      - "#Steps..inputParameters[*].name"
      - "$.capability.exposes[*].resources[*].operations[*].inputParameters[*].name"
    then:
      function: pattern
      functionOptions:
        notMatch: "^(url|callback|redirect|webhook|redirect-url|callback-url|webhook-url)$"
