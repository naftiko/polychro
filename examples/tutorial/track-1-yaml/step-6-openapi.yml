openapi: 3.0.3
info:
  title: Modern Maritime Registry API
  version: 1.0.0
  description: A tiny slice of the Modern Maritime Registry, used as the red thread of Polychro Track 1.
paths:
  /ships:
    summary: Collection of registered ships.
    get:
      operationId: get-ship
      summary: List all registered ships.
      responses:
        "200":
          description: A list of ships.
  /ships/{imo_number}:
    summary: A single ship by IMO number.
    get:
      operationId: get-ship
      summary: Get one ship by IMO number.
      parameters:
        - name: imo_number
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The requested ship.
  /crew:
    summary: Collection of crew members.
    get:
      operationId: list-crew
      summary: List all crew members.
      responses:
        "200":
          description: A list of crew members.
