openapi: 3.0.3
info:
  title: Users API
  version: 1.0
  description: A tiny users service used as the red thread of Polychro Track 1.
paths:
  /users:
    summary: Collection of users.
    get:
      operationId: listUsers
      summary: List all users.
      responses:
        "200":
          description: A list of users.
    post:
      operationId: createUser
      summary: Create a new user.
      responses:
        "201":
          description: The created user.
  /users/{id}:
    summary: A single user by id.
    get:
      operationId: getUser
      summary: Get one user by id.
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: The requested user.
