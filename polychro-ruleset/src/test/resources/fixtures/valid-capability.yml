specVersion: 1.0.0-alpha1
info:
  name: valid-capability
  version: 1.0.0
  description: "A valid test capability for integration testing."
  tags:
    - integration
    - test

capability:
  consumes:
    - namespace: github-api
      type: http
      description: "GitHub REST API"
      baseUri: https://api.github.com
      resources:
        - name: repos
          path: /repos/{owner}/{repo}
          operations:
            - name: get-repo
              method: GET
              outputParameters:
                - name: full-name
                  mapping: full_name
                  type: string

  exposes:
    - namespace: my-rest
      type: rest
      port: 8080
      description: "Main REST API"
      resources:
        - path: /repos
          description: "Repository information"
          operations:
            - name: get-repo
              method: GET
              description: "Fetch repository details"
              steps:
                - name: fetch-repo
                  call: github-api/repos/get-repo
              outputParameters:
                - name: repo-name
                  mapping: fetch-repo.full-name
                  type: string
