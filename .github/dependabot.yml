version: 2

updates:
- package-ecosystem: "maven"
  directory: "/"
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 2
  labels:
  - dependencies
  groups:
    all-dependencies:
      patterns:
      - "*"

- package-ecosystem: "github-actions"
  directory: "/"
  schedule:
    interval: "weekly"
  groups:
    all-actions:
      patterns:
      - "*"

- package-ecosystem: "gomod"
  directory: "/polychro-go"
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 2
  groups:
    all-dependencies:
      patterns:
      - "*"

- package-ecosystem: "npm"
  directory: "/polychro-node"
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 2
  groups:
    all-dependencies:
      patterns:
      - "*"

- package-ecosystem: "pip"
  directory: "/polychro-python"
  schedule:
    interval: "weekly"
  open-pull-requests-limit: 2
  groups:
    all-dependencies:
      patterns:
      - "*"
