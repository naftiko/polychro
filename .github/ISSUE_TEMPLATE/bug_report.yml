name: Bug Report
description: Report a bug or unexpected behavior in Polychro
labels: ["bug"]
body:
  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which component is affected?
      options:
        - Core Engine (polychro-core)
        - CLI (polychro-cli)
        - MCP Capability (polychro-capability)
        - Validators (json-schema, json-structure, wellformedness, markdown, checkov)
        - Rulesets (polychro-rulesets)
        - GitHub Action (polychro-github-action)
        - Go SDK (polychro-go)
        - Node.js SDK (polychro-node)
        - Python SDK (polychro-python)
        - Documentation
        - Other
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Polychro Version
      placeholder: "e.g. 0.1.0-SNAPSHOT"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. Ubuntu 22.04, macOS 14, Windows 11"
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened? What did you expect to happen?
      placeholder: |
        **Actual behavior:**
        ...

        **Expected behavior:**
        ...
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: Minimal steps to reproduce the issue, including the command used
      placeholder: |
        1. Command: `polychro lint --ruleset polychro:ai-safety my-spec.yml`
        2. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs & Stacktrace
      description: Paste any relevant logs or stack traces
      render: text
    validations:
      required: false

  - type: textarea
    id: agent-context
    attributes:
      label: Agent Context (optional)
      description: |
        If this issue was created or assisted by an AI agent, paste agent metadata here (YAML).
      placeholder: |
        agent_name:
        llm:
        tool:
        confidence:          # low | medium | high
        source_event:
        discovery_method:    # runtime_observation | code_review | test_failure | user_report
        files_suspected:
          -
      render: yaml
    validations:
      required: false
