name: Publish CLI Binaries

on:
  push:
    tags:
      - 'v*'  # Only trigger by new tags starting by "v" (v1.0.0, v2.1.3...). Because the build takes time.
  workflow_dispatch:
  workflow_call:  

jobs:
  build-native:
    name: Build on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          # Linux AMD64
          - os: ubuntu-latest
            artifact_name: polychro-cli-linux-amd64

          # Linux ARM64
          - os: ubuntu-24.04-arm
            artifact_name: polychro-cli-linux-arm64

          # macOS Apple Silicon (ARM64)
          - os: macos-latest  # macos-14+ uses Mx runners
            artifact_name: polychro-cli-macos-arm64

          # Windows AMD64
          - os: windows-latest
            artifact_name: polychro-cli-windows-amd64.exe

    permissions:
      contents: write
      packages: read

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Set up Maven credentials for GitHub Packages
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '21'
          server-id: github-naftiko
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup GraalVM
        uses: graalvm/setup-graalvm@v1
        with:
          java-version: '21'
          distribution: 'graalvm'
          github-token: ${{ secrets.GITHUB_TOKEN }}
          native-image-job-reports: 'true'

      - name: Setup MSVC (Windows)
        if: runner.os == 'Windows'
        uses: ilammy/msvc-dev-cmd@v1

      - name: Build with Maven (Unix)
        if: runner.os != 'Windows'
        run: mvn -B clean package -Pnative -pl polychro-cli -am -Dtest="io.polychro.cli.**" -Dsurefire.failIfNoSpecifiedTests=false
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Build with Maven (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: mvn -B clean package -Pnative -pl polychro-cli -am "-Dtest=io.polychro.cli.**" "-Dsurefire.failIfNoSpecifiedTests=false"
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}

      - name: Rename artifact (Unix)
        if: runner.os != 'Windows'
        run: mv polychro-cli/target/polychro-cli polychro-cli/target/${{ matrix.artifact_name }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: Move-Item polychro-cli\target\polychro-cli.exe polychro-cli\target\${{ matrix.artifact_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.artifact_name }}
          path: polychro-cli/target/${{ matrix.artifact_name }}

      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/')  # Only create release when a new tag is pushed (not when action is manually triggered).
        uses: softprops/action-gh-release@v3
        with:
          files: polychro-cli/target/${{ matrix.artifact_name }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  test-binary:
    name: Smoke test on ${{ matrix.os }}
    needs: build-native
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            artifact_name: polychro-cli-linux-amd64
          - os: ubuntu-24.04-arm
            artifact_name: polychro-cli-linux-arm64
          - os: macos-latest
            artifact_name: polychro-cli-macos-arm64
          - os: windows-latest
            artifact_name: polychro-cli-windows-amd64.exe

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v8
        with:
          name: ${{ matrix.artifact_name }}
          path: ./bin

      - name: Make executable
        if: runner.os != 'Windows'
        run: chmod +x ./bin/${{ matrix.artifact_name }}

      - name: Smoke test version
        shell: bash
        run: |
          BIN="./bin/${{ matrix.artifact_name }}"

          OUT=$("$BIN" --version 2>&1 || true)
          echo "$OUT"

          echo "$OUT" | grep -E "polychro|[0-9]+\.[0-9]+"

          if echo "$OUT" | grep -E "MissingResourceException|ExceptionInInitializerError"; then
            echo "FAIL"
            exit 1
          fi

      - name: Smoke test CLI help
        shell: bash
        run: |
          BIN="./bin/${{ matrix.artifact_name }}"
          "$BIN" --help
          "$BIN" lint --help
          
      - name: Smoke test — JSON Schema lint (regression guard)
        shell: bash
        run: |
          BIN="./bin/${{ matrix.artifact_name }}"

          echo '{"type":"object","required":["missing"]}' > schema.json
          echo 'foo: bar' > sample.yaml

          STDERR=$("$BIN" lint sample.yaml -s schema.json 2>&1 || true)

          echo "$STDERR"

          if echo "$STDERR" | grep -E "MissingResourceException|ExceptionInInitializerError"; then
            echo "FAIL: native runtime regression"
            exit 1
          fi

      - name: Smoke test — Markdown ruleset projection (DocumentEnricher regression guard)
        shell: bash
        run: |
          BIN="./bin/${{ matrix.artifact_name }}"

          # polychro-markdown registers MarkdownDocumentEnricher via ServiceLoader so
          # Document.fromString can project markdown into $.document.blocks[*] (issue #36/#37).
          # GraalVM native-image does NOT auto-discover this SPI: it needs an explicit
          # reflect-config.json entry for the class and a resource-config.json pattern for
          # META-INF/services/io.polychro.spi.DocumentEnricher. If that registration regresses,
          # ServiceLoader silently returns no providers (no exception raised), the document
          # falls back to a raw TextNode, and the rule below would find zero matches instead
          # of firing — a false "no issues" pass that the exception-only checks above cannot
          # catch. This step proves the projected structure is actually there by asserting a
          # deliberate rule violation fires against it.
          printf '# Title\n\nSome paragraph.\n' > doc.md
          printf 'rules:\n  first-block-must-be-paragraph:\n    message: "First block must be a paragraph"\n    severity: error\n    given: "$.document.blocks[0]"\n    then:\n      field: "type"\n      function: pattern\n      functionOptions:\n        match: "^paragraph$"\n' > markdown-ruleset.yml

          set +e
          OUT=$("$BIN" lint doc.md -r markdown-ruleset.yml 2>&1)
          STATUS=$?
          set -e

          echo "$OUT"

          if [ "$STATUS" -ne 2 ] || ! echo "$OUT" | grep -q "First block must be a paragraph"; then
            echo "FAIL: markdown DocumentEnricher regression — expected a violation on projected \$.document.blocks[0], got exit=$STATUS"
            exit 1
          fi

      - name: Smoke test — HTML ruleset projection (DocumentEnricher regression guard)
        shell: bash
        run: |
          BIN="./bin/${{ matrix.artifact_name }}"

          # Same guard as above for polychro-html's HtmlDocumentEnricher, projecting into
          # $.document.nodes[*]. A full HTML document parses in "document" mode, so nodes[0]
          # is the <html> element itself — asserting it is NOT "body" deliberately fires.
          printf '<html><body><p>hi</p></body></html>\n' > doc.html
          printf 'rules:\n  first-node-must-be-body:\n    message: "First top-level node must be body"\n    severity: error\n    given: "$.document.nodes[0]"\n    then:\n      field: "tag"\n      function: pattern\n      functionOptions:\n        match: "^body$"\n' > html-ruleset.yml

          set +e
          OUT=$("$BIN" lint doc.html -r html-ruleset.yml 2>&1)
          STATUS=$?
          set -e

          echo "$OUT"

          if [ "$STATUS" -ne 2 ] || ! echo "$OUT" | grep -q "First top-level node must be body"; then
            echo "FAIL: html DocumentEnricher regression — expected a violation on projected \$.document.nodes[0], got exit=$STATUS"
            exit 1
          fi
