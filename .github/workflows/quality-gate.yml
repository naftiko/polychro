name: Quality Gate

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: Build & Test Java 21
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github-naftiko
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Build and verify
        # polychro-capability and polychro-cli require io.ikanos:ikanos-engine and
        # io.ikanos:ikanos-spec from GitHub Packages.
        # setup-java injects credentials via server-id: github-naftiko (matches pom.xml repo id).
        run: mvn -B clean verify
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
  test-go:
    name: Test Go
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: polychro-go/go.mod

      - name: Run tests
        working-directory: polychro-go
        run: go test ./...

  test-node:
    name: Test Node
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: polychro-node/package-lock.json

      - name: Install dependencies
        working-directory: polychro-node
        run: npm ci

      - name: Run tests
        working-directory: polychro-node
        run: npm test

  test-python:
    name: Test Python
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install package and test dependencies
        working-directory: polychro-python
        run: pip install . pytest

      - name: Run tests
        working-directory: polychro-python
        run: pytest