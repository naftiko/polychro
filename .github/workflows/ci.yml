name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

permissions:
  contents: read
  packages: read

jobs:
  build:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven
          server-id: github-naftiko
          server-username: MAVEN_USERNAME
          server-password: MAVEN_PASSWORD

      - name: Build and verify
        # polychro-capability and polychro-cli require io.ikanos:ikanos-engine and
        # io.ikanos:ikanos-spec from GitHub Packages.
        # setup-java injects credentials via server-id: github-naftiko (matches pom.xml repo id).
        run: mvn -B clean verify
        env:
          MAVEN_USERNAME: ${{ github.actor }}
          MAVEN_PASSWORD: ${{ secrets.GITHUB_TOKEN }}
