name: CI

on:
  push:
    branches: [ "**" ]
  pull_request:
    branches: [ "**" ]

jobs:
  build:
    name: Build & Test (Java 21)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build and verify
        # polychro-capability depends on io.ikanos:ikanos which is not yet published
        # to GitHub Packages. polychro-cli depends on polychro-capability.
        # Both are excluded until the SNAPSHOT is available upstream.
        run: mvn -B clean verify --pl '!polychro-capability,!polychro-cli'
